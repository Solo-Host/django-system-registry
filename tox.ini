[tox]
requires = tox>=4.28
env_list =
    py313
    lint
    mypy
    security
skip_missing_interpreters = true

[testenv]
description = Run the pytest suite on Python 3.13
extras = dev
commands =
    pytest {posargs:tests}

[testenv:lint]
description = Run Ruff lint checks
extras = dev
commands =
    ruff check {posargs:system_registry tests}

[testenv:ruff]
description = Alias for lint
extras = dev
commands =
    ruff check {posargs:system_registry tests}

[testenv:mypy]
description = Run mypy type checks
extras = dev
commands =
    mypy {posargs:system_registry tests}

[testenv:bandit]
description = Run Bandit against application code
extras = dev
commands =
    bandit -q -r system_registry -x system_registry/migrations

[testenv:pip-audit]
description = Audit installed dependencies for known vulnerabilities
extras = dev
commands =
    pip-audit

[testenv:security]
description = Run security checks
extras = dev
commands =
    bandit -q -r system_registry -x system_registry/migrations
    pip-audit
